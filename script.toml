[[RequiredParams]]
  Name = "id"
  Desc = "用户的id"
  Intro = "登陆用"

[[RequiredParams]]
  Name = "password"
  Desc = "密码"
  Intro = "用户密码，登陆用"

[[RequiredParams]]
  Name = "cmd_ride"
  Desc = "骑坐骑的指令"
  Intro = "比如ride bao-feiji。\n留空则不尝试rideto。"

[[RequiredParams]]
  Name = "miss_list"
  Desc = "miss列表"
  Intro = "用来miss的10兵的位置，一行一个格式为\n武器id|位置，比如\n\nhszz|4109\n\nmiss失败会自动stab"

[[RequiredParams]]
  Name = "house"
  Desc = "房屋信息(重新加载起效)"
  Intro = "设置后添加虚拟房屋信息\n格式为'机器人工厂 robot 4084'\n如有密码，格式为\n'机器人工厂 robot 4084 password'\n可以在房屋信息前加入c代表彩虹居，d代表独乐居，如\n'd小房子 smallhouse 2785'\n'c黑灯工厂 factory 2785'\n\n可通过game/shared/hongchenjs/house.txt进行全局设置"

[[RequiredParams]]
  Name = "house_dummy"
  Desc = "房屋(箱子)大米设置"
  Intro = "格式为大米id 口令\n如\njarlyyn 123456\n\n有口令的情况下，没钥匙时会找大米要钥匙\n\n如果没设置房子，在没key时会把物品给大米\n\n大米必须要能够在lu ban哪里ask 钥匙，是房主或者房主配偶。\n大米需要能开chatroom\n大米也需要正确的设置这个变量\n大米需要运行#dummy任务\n\n可通过game/shared/hongchenjs/house_dummy.txt全局设置"

[[RequiredParams]]
  Name = "quest"
  Desc = "任务列表"
  Intro = "#start不带参数会执行这个列表里的任务，一行一个，越上面的越优先。\n\n如果设置为单行，#开头的，会认为你需要执行预设的别名。"

[[RequiredParams]]
  Name = "combat"
  Desc = "战斗指令"
  Intro = "有$1(对象),$wpon(装备武器),$wpoff(卸装备指令）3个变量\n有#before,#start,#send(默认)三种指令\n\n战斗指令,参考：\n#before yun recover\n#start $wpon\n#start perform sword.kuang $1\nyun recover\nperform sword.kuang\n\n或\n#before yun regenerate;hand bow\n#start shot $1 with arrow\nyun recover\nshot $1 with arrow"

[[RequiredParams]]
  Name = "command"
  Desc = "指令"
  Intro = "设置在不同场景下发送的指令。\n会在游戏提示触发场景时发送对应的命令。\n比如\n\n#prepare yun powerup;yun shield;#wpoff 2\n#npcfaint #wpoff 1;#wpon 2\n#npcdie #wpoff 2\n#wait #jiqu\n#moveyanjiu #yanjiu\n#pause #yanjiulian"

[[RequiredParams]]
  Name = "weapon"
  Desc = "武器"
  Intro = "武器相关设置\n\n支持\n#wield 武器ID\n#wear 空手武器ID\n#wield.别名 武器ID\n的格式\n\n以及\n#repair 修理装备id\n#repair 修理装备id * 修理需要的黄金\n的格式\n\n有10 lv的话通过\n\n#touch 武器id\n\n设置touch的武器\n\n默认第一把武器和touch的武器不在身上会自动summon,如果需要自动summon其他武器可以使用#summon命令指定，比如\n\n#summon tianzijian\n\n注意，如果空手id有做保护等需要进入古墓的任务，建议注册一个\n#wield.sword long sword\n并在item里加入long sword\n这样会装备long sword刺墙"

[[RequiredParams]]
  Name = "items"
  Desc = "物品配置"
  Intro = "一行一个物品id。\n需要多个可以 id * 数量\n如：\nfire\nlong sword\nlong bow\narrow * 30\n#qu.10 Huogu lingyao * 5\n#qu feicui lan\n#nobox\n\n#qu为从箱子里取。小数点后是一次拿几个。\n设置#nobox或未设置房间或者没钥匙时,#qu会尝试在聊天室地上拿道具。\n支持吃药，包括活骨灵药，翡翠兰，回阳无极丹，修罗无常丹，罗刹无常丹，玉洞黑石丹，无常丹，九花玉露丸，白虎夺命丹，天王保命丹，生生造化丹，九转熊蛇丸。\n带身上会自动吃\n可通过game/shared/hongchenjs/items.txt全局设置"

[[RequiredParams]]
  Name = "jifa"
  Desc = "激发指令(选填，实时生效)"
  Intro = "用于设置jifa和bei的指令\n用于练习结束后，或者通过#jifa指令手动调用。\n确保使用正确的武功做任务\n#lian和#yanjiulian指令会根据这个变量的设置，在练习后激活正确的技能"

[[RequiredParams]]
  Name = "max_exp"
  Desc = "最大经验"
  Intro = "部分任务中超过这个会放弃。\n留空或小于等于0不放弃\n+号开头为动态经验，按最高等级+3计算安全经验，加上加号后的余量为放弃经验的标准"

[[RequiredParams]]
  Name = "max_pot"
  Desc = "潜能上限(实时更新)"
  Intro = ""

[[RequiredParams]]
  Name = "study"
  Desc = "学习指令，一行一个学习内容"
  Intro = "格式为\n\n技能ID|学习限制|类型|目标|位置|开始指令|结束指令\n除了技能ID都能省略，类型默认为yanjiu\n技能ID以!开头代表强制优先学习\n可以 #teacher ID@位置的方式设置老师信息\n参考:\n\nsword|180|xue|feng buping|2226|wield sword\nforce|180|xue\nhuashan-xinfa\n!zuoyou-hubo|360|xue|zhou botong|779\n#teacher feng buping@2226"

[[RequiredParams]]
  Name = "min_pot"
  Desc = "潜能下限(实时更新,选填)"
  Intro = ""

[[RequiredParams]]
  Name = "lian"
  Desc = "练习指令(选填)"
  Intro = "一行一个练习内容\n格式同学习指令\n技能ID|学习限制|类型|基本功夫|位置|开始指令|结束指令\n可以通过助理按钮初始化，再调整\n\n也支持读书，比如\n\nforce|200|du|du zhenjing taben 50|4186\n\n的格式去指定位置读书"

[[RequiredParams]]
  Name = "sell"
  Desc = "道具处理指令(选填)"
  Intro = "具体参考帮助中的战利品处理。师门任务的奖励默认也可以通过这个来设置\n\n特别，对于items里#qu的道具，可以设置一个最大持有数量\n\n比如\n\n#home.10 id=huogu lingyao * 20\n最多带20个huogu lingyao,超过了去存10个\n\n#home id=feicui lan * 2\n最多带2个翡翠兰(lan不能堆叠)\n\n可通过game/shared/hongchenjs/assets.txt全局设置"

[[RequiredParams]]
  Name = "id_pass"
  Desc = "门派缩写（选填）"
  Intro = "留空从门派自动判断"

[[RequiredParams]]
  Name = "jiqu"
  Desc = "汲取武道设置(选填)"
  Intro = "设置数字则为最大体会，数字小于等于0不汲取，不设自动设置。\n\n#cmd可以指定多条汲取指令。不设则自动。参考\n\n400\n#cmd jiqu\n#cmd #unwield;#wpon;jiqu sword-cognize"

[[RequiredParams]]
  Name = "params"
  Desc = "系统参数(选填)"
  Intro = "不要手动设置，通过助理按钮的设置系统参数功能设置。"

[[RequiredParams]]
  Name = "quest_params"
  Desc = "任务参数(选填)"
  Intro = "任务相关参数的设置\n不要手动设置，通过助理按钮的设置系统参数功能设置。"

[[RequiredParams]]
  Name = "policy_params"
  Desc = "决策参数(选填)"
  Intro = "决策相关参数的设置\n不要手动设置，通过助理按钮的设置系统参数功能设置。"

[[RequiredParams]]
  Name = "autorun"
  Desc = "大米自动执行任务(选填)"
  Intro = "填写后，机器打开就会自动执行对应的命令。\n\n一般给各种大米用。"
