Type = "v8"
Intro = "机器特性\n\n机器的物资流转是围绕房子的百宝箱运转的，所以需要长期挂机的ID都要设置房屋信息，并带着房子的钥匙。\n可以挂一个#dummy的钥匙大米，自动发钥给正确的置了house_dummy的id\n\n快捷指令：\n#dummy 拿钥匙大米，需要能自建聊天室以及能在lu ban那里ask key。需要正确设置house_dummy属性。会自动给设置了house_dummy的id房子钥匙。\n#mq 自动进行任务，优先级为灵感塔>锄奸>师门>freequest\n#mq1  灵感塔>师门>freequest,体会或潜能为full状态时，会在师门前插入保护，锄奸，练功消耗体会和潜能。这个模式建议把command变量 加入#wait jiqu ,#pause #yanjiulian。\n#mq0 灵感塔>锄奸>师门>fq>保护。和#mq的区别是优先锄奸还是师门\n#mq2 灵感塔>师门>freequest\n#mq3 练功>师门>freequest,适合没10lv的小号\n#baohu 灵感塔>保护>锄奸>练技能\n#tianlao 天牢>练功>发呆\n#noob FQ>长安>配药>练功>送信>发呆，建议先ask gift,再拜师，学点特殊内功，设置好学习\n#stop 停止任务\n#login 输入登录信息"
Desc = "Mud红尘的机器人脚本"
OnOpen = "onOpen"
OnClose = "onClose"
OnConnect = "onConnected"
OnDisconnect = "onDisconnected"
OnBroadcast = "onBroadcast"
OnFocus = "onFocus"
